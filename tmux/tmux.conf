# FILE: iceberg.tmux.conf
# REPO: https://github.com/gkeep/iceberg-dark
# MAINTAINER: gkeep <gkeep77@protonmail.com>

set -g status-justify "centre"
set -g status "on"
set -g allow-passthrough on
set -g update-environment "DISPLAY SSH_ASKPASS SSH_AUTH_SOCK SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY TERM_PROGRAM WEZTERM_EXECUTABLE WEZTERM_PANE"
set -g status-left-style "none"
set -g message-command-style "fg=#c6c8d1,bg=#2e3244"
set -g status-right-style "none"
set -g pane-active-border-style "fg=#84a0c6"
set -g status-style "none,bg=#161821"
set -g message-style "fg=#c6c8d1,bg=#2e3244"
set -g pane-border-style "fg=#c6c8d1"
set -g pane-border-status bottom
set -g pane-border-format " #{?pane_active,#[fg=#b7f774],#[fg=#c6c8d1]} "
set -g window-style "default"
set -g window-active-style "default"
set -g status-right-length "100"
set -g status-left-length "100"
setw -g window-status-activity-style "none,fg=#e2a478,bg=#161821"
setw -g window-status-separator ""
setw -g window-status-style "none,fg=#c6c8d1,bg=#161821"
# set-option -g status-interval 2

# modules
module_right_1="#(ip route get 1 | awk '{print $7}')"
module_right_2="%m/%d %a"

# separators
separator_left="\ue0bc"
separator_right="\ue0ba"

subseparator_left="\ue0bb"
subseparator_right="\ue0bd"

# window status
set -g status-left ""

#set-option -ga status-left " #[fg=white]#(echo '#{pane_current_path}' )"

set -g status-right "#[fg=#3e445e,bg=#161821,nobold,nounderscore,noitalics]$separator_right#[fg=#c6c8d1,bg=#3e445e] $module_right_1 #[fg=#84a0c6,bg=#3e445e,nobold,nounderscore,noitalics]$separator_right#[fg=#161821,bg=#84a0c6,bold] $module_right_2 #{prefix_highlight}"
setw -g window-status-format "#[fg=#3e445e,bg=#161821,nobold,nounderscore,noitalics]$separator_right#[fg=#c6c8d1,bg=#3e445e] #I:#W #[fg=#3e445e,bg=#161821,nobold,nounderscore,noitalics]$separator_left"
setw -g window-status-current-format "#{?client_prefix,#[fg=#e2a478]#[bg=#161821]#[nobold]#[nounderscore]#[noitalics]$separator_right#[fg=#161821]#[bg=#e2a478] #I:#W #[fg=#e2a478]#[bg=#161821]#[nobold]#[nounderscore]#[noitalics]$separator_left,#[fg=#84a0c6]#[bg=#161821]#[nobold]#[nounderscore]#[noitalics]$separator_right#[fg=#161821]#[bg=#84a0c6] #I:#W #[fg=#84a0c6]#[bg=#161821]#[nobold]#[nounderscore]#[noitalics]$separator_left}"
# /iceberg like tmux

# Clear removed hooks from already-running tmux servers.
set-hook -gu client-session-changed
set-hook -gu pane-focus-in
set-hook -gu window-pane-changed
set-hook -gu session-window-changed

set-hook -g client-session-changed "run-shell -b '$HOME/dotfiles/tmux/scripts/update_wezterm_status.sh'"
set-hook -g pane-focus-in "run-shell -b '$HOME/dotfiles/tmux/scripts/update_wezterm_status.sh'"
set-hook -g window-pane-changed "run-shell -b '$HOME/dotfiles/tmux/scripts/update_wezterm_status.sh'"
set-hook -g session-window-changed "run-shell -b '$HOME/dotfiles/tmux/scripts/update_wezterm_status.sh'"
set-hook -g after-new-session "run-shell -b '$HOME/dotfiles/tmux/scripts/update_wezterm_status.sh'"
set-hook -g session-renamed "run-shell -b '$HOME/dotfiles/tmux/scripts/update_wezterm_status.sh'"

# unbind
unbind C-h
unbind C-j
unbind C-k
unbind C-l

# ペインの開始番号を 0 から 1 に変更する
set-option -g base-index 1

# マウスでウィンドウ・ペインの切り替えやリサイズを可能にする
set-option -g mouse on                    # tmux 2.1以降

# マウスホイールでヒストリではなくスクロールできるようにする
set -g mouse on
set -g terminal-overrides 'xterm*:smcup@:rmcup@'

## ステータスバーの背景色を変更する
##set-option -g status-bg "colour255"
#
## 画面の色
#set-option default-terminal "screen-256color"
#
# -rオプションでバインドしたキーは一定時間連続入力可能
# デフォルトは500ms
set -g repeat-time 500

# Escの反応速度
set -sg escape-time 0

# ペインのサイズの変更
# ペインの最大化
bind -r C-z resize-pane -Z

# ペインの分割
bind -N "Split horizontally" | split-window -h
bind -N "Split vertically" - split-window -v
# Prefix + w + s/v/w
bind -T prefix -N "Window prefix" w switch-client -T w
bind -T w -N "Split vertically" s split-window -v
bind -T w -N "Split horizontally" v split-window -h
bind -T w -N "Choose window" w choose-window
unbind -q -T w h
unbind -q -T w j
unbind -q -T w k
unbind -q -T w l
# ペインのフォーカス
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind -r -N "Move pane left" Left swap-pane -d -t "{left-of}"
bind -r -N "Move pane down" Down swap-pane -d -t "{down-of}"
bind -r -N "Move pane up" Up swap-pane -d -t "{up-of}"
bind -r -N "Move pane right" Right swap-pane -d -t "{right-of}"
bind -r -N "Resize pane left 5"  H resize-pane -L 5
bind -r -N "Resize pane down 5"  J resize-pane -D 5
bind -r -N "Resize pane up 5"    K resize-pane -U 5
bind -r -N "Resize pane right 5" L resize-pane -R 5
bind -r -N "Resize pane left 1"  M-h resize-pane -L 1
bind -r -N "Resize pane down 1"  M-j resize-pane -D 1
bind -r -N "Resize pane up 1"    M-k resize-pane -U 1
bind -r -N "Resize pane right 1" M-l resize-pane -R 1
bind -n -N "Focus pane left" S-left select-pane -L
bind -n -N "Focus pane down" S-down select-pane -D
bind -n -N "Focus pane up" S-up select-pane -U
bind -n -N "Focus pane right" S-right select-pane -R

# Prefix + Shift + Arrow で 5 行リサイズ（連続入力可）
bind -r -N "Resize pane left 5"  S-left  resize-pane -L 5
bind -r -N "Resize pane down 5"  S-down  resize-pane -D 5
bind -r -N "Resize pane up 5"    S-up    resize-pane -U 5
bind -r -N "Resize pane right 5" S-right resize-pane -R 5

# choose-tree 内でも新規セッションを作成
bind -T choose-tree-vi N display-popup -E -w 90% -h 80% "sh -c '$HOME/dotfiles/tmux/scripts/new_session_fzf.sh'"
bind -T choose-tree N display-popup -E -w 90% -h 80% "sh -c '$HOME/dotfiles/tmux/scripts/new_session_fzf.sh'"



# ウィンドウのフォーカス
bind -r n next-window
bind -r p previous-window
bind -r C-n next-window
bind -r C-p previous-window
bind -r C display-popup -E -w 90% -h 80% "sh -c '$HOME/dotfiles/tmux/scripts/new_session_fzf.sh'"
bind-key -N "Popup shell" s display-popup -E -d "#{pane_current_path}" -w 90% -h 80% "exec $SHELL -l"
bind-key -N "Session chooser" S choose-tree -Zs
bind-key -N "New window" t new-window
unbind -T prefix T
bind-key -N "Respawn pane" r confirm-before -p "respawn-pane #P? (y/n)" "respawn-pane -k"
bind-key -N "Toggle pane record" R run-shell -b "$HOME/dotfiles/tmux/scripts/toggle_pipe_pane.sh"
bind-key -N "Capture pane" Y run-shell -b "$HOME/dotfiles/tmux/scripts/capture_pane.sh"
unbind -q -T prefix "{"
unbind -q -T prefix "}"
bind-key -r -N "Move window left" [ swap-window -d -t -1
bind-key -r -N "Move window right" ] swap-window -d -t +1
bind-key -N "Attach or create session by name" A command-prompt -p "Session name" "new-session -A -s '%%'"
bind-key -N "Choose pane" g display-panes -d 3000
bind-key -N "Rename window" , command-prompt -I "#W" "rename-window '%%'"
bind-key -N "Rename session" '$' command-prompt -I "#S" "rename-session '%%'"

# セッションの移動
bind-key N switch-client -n
bind-key P switch-client -p

# ウィンドウを閉じた時に番号を詰める
set-option -g renumber-windows on

# コピーモードをviモードに変更
set-window-option -g mode-keys vi
# Prefix + y でコピーモード
unbind -T prefix y
bind-key -T prefix -N "Copy mode" y copy-mode
unbind -T prefix c
bind-key -T prefix -N "Copy mode" c copy-mode
# Prefix + v で貼り付け
unbind -T prefix v
bind-key -T prefix -N "Paste buffer" v paste-buffer -p
unbind -T prefix V
bind-key -T prefix -N "List buffers" V list-buffers
# 選択開始キーをvに変更
bind -T copy-mode-vi v send-keys -X begin-selection
# クリップボードへのコピー
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
# 矩形選択の切り替え設定
# ※あくまで選択の切り替えなので、選択開始はvを押してから
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
# Vで行ごとの選択
bind -T copy-mode-vi V send-keys -X select-line
# Escで選択範囲の解除
bind -T copy-mode-vi C-[ send-keys -X clear-selection


# Prefix(Ctrl-b)をCtrl-jに変更する
unbind-key C-b
set-option -g prefix C-j
bind-key C-j send-prefix

# Prefix + / のヘルプを全表示（整形＋色付き）
bind-key / display-popup -E -w 90% -h 80% "sh -c '$HOME/dotfiles/tmux/scripts/keybinds_menu.sh'"

# Prefix + ? で zsh コマンド一覧
bind-key ? display-popup -E -w 90% -h 80% "sh -c '$HOME/dotfiles/zsh/scripts/commands_menu.sh'"
